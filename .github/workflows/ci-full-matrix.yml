name: CI Full Matrix

# Full cross-browser regression matrix. Runs on push-to-main (so every
# squash merge is immediately exercised against webkit) and on a daily
# schedule (so webkit-only drift is caught even without merge activity).
# Also exposes `workflow_dispatch` so an operator can re-run on demand.
#
# This workflow is OBSERVATIONAL — it is intentionally not a required
# check on branch protection. Per issue #468 + AGENT.md directive #13,
# a failing run here should be escalated to a `p0`, `type:bug` issue.
# Automated escalation (`gh issue create` on failure) is deferred; the
# expectation is that the agent reading STATUS notices a red main-CI
# run and files the issue manually as part of the iteration's PR sweep.
# When the deferred automation is implemented (separate issue), add a
# final `escalate` job conditional on `failure()` that runs
# `gh issue create --label phase:15,type:bug,p0,area:cross-cutting`.
#
# Shape mirrors ci.yml (fast → sharded e2e → merge-reports), but the
# `e2e` job runs ALL FOUR projects (chromium + chromium-visual +
# webkit + webkit-visual) instead of chromium-only.
on:
  push:
    branches: [main]
  schedule:
    # 09:00 UTC daily ≈ start of the agent's typical operating window.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

concurrency:
  group: ci-full-matrix-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  # Same fast lane as ci.yml. Doc-only push-to-main runs (e.g. STATUS
  # syncs, journal appends) skip the e2e matrix below via the `code`
  # classifier — see docs/adr/0016-ci-doc-only-skip-e2e.md.
  fast:
    name: fast
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!LICENSE'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

  # Full project matrix: chromium + chromium-visual + webkit +
  # webkit-visual, sharded 4 ways (same as ci.yml). No `--project=`
  # filter — playwright runs every project defined in
  # playwright.config.ts.
  e2e:
    name: e2e (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: fast
    if: ${{ needs.fast.outputs.code == 'true' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E shard ${{ matrix.shard }}/4 (full matrix)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4 --reporter=blob

      - name: Upload blob report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Playwright test-results (shard ${{ matrix.shard }})
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

  merge-reports:
    name: merge-reports
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ always() && needs.e2e.result != 'skipped' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge blobs into single HTML report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
