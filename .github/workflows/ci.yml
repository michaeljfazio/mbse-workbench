name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    # 60min cap (was 30) so a baseline shake-out run still flushes the
    # playwright-report artifact before the job is cancelled — that report
    # is required by the lift-from-trace rebaseline procedure in
    # docs/CONTEXT.md. Note: @visual specs run with `retries: 0` (see
    # playwright.config.ts) so a baseline storm no longer triples the
    # wallclock on retries; only functional flakes retry.
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Classify the PR/push changed-file set as `code` (anything that
      # could affect runtime behaviour) or doc-only. Doc-only PRs skip
      # the ~30-40min Playwright install + e2e steps below; the `check`
      # job still runs (typecheck/lint/unit/build) and still reports
      # the `check` status, so branch protection requires no change.
      # See docs/adr/0016-ci-doc-only-skip-e2e.md and issue #453.
      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!LICENSE'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

      - name: Cache Playwright browsers
        if: steps.filter.outputs.code == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.filter.outputs.code == 'true'
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E tests
        if: steps.filter.outputs.code == 'true'
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() && steps.filter.outputs.code == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      # `playwright-report/` is only flushed when the run completes — on a
      # job-cancelled timeout the upload step finds no files (see run
      # 25937962140). `test-results/` is written incrementally per test
      # and contains the per-test `<arg>-actual.png` for every failing
      # `toHaveScreenshot` assertion, so it survives cancellation and is
      # the input the lift-from-trace rebaseline procedure actually needs.
      - name: Upload Playwright test-results (per-test actuals/diffs)
        if: ${{ always() && steps.filter.outputs.code == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
